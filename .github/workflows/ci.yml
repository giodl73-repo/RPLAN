name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust
    runs-on: windows-latest

    steps:
      - name: Check out RPLAN
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Test workspace
        run: cargo test --workspace

      - name: Smoke CLI
        run: cargo run -p rplan-cli -- --help

